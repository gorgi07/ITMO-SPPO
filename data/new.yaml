all:
  application:
    name: "My Web App"
    environment: "production"
    maintenance_mode: false

  routes:
    - path: "/"
      controller: "HomeController"
      action: "index"
    - path: "/login"
      controller: "AuthController"
      action: "login"

  cache:
    enabled: true
    ttl: 3600  # время жизни кэша в секундах

  email:
    smtp_server: "smtp.example.com"
    port: 587
    username: "email_user"
    password: "email_password"
    use_tls: true
